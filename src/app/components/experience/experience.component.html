<section class="section" id="experience">
  <div class="container">

    <div class="section-header">
      <p class="section-label">// trayectoria</p>
      <h2 class="section-title">Experiencia <span class="gradient-text">profesional</span></h2>
    </div>

    <div class="timeline">
      @for (job of jobs; track job.company; let i = $index) {
        <div class="timeline-item" [class.right]="i % 2 !== 0">
          <!-- Dot -->
          <div class="timeline-dot" [style.background]="job.color" [style.box-shadow]="'0 0 20px ' + job.color + '60'">
            @if (job.current) {
              <span class="pulse-ring" [style.border-color]="job.color"></span>
            }
          </div>

          <!-- Card -->
          <div class="glass-card timeline-card">
            <div class="card-top">
              <div>
                <div class="company-row">
                  <h3 class="company">{{ job.company }}</h3>
                  @if (job.current) {
                    <span class="current-badge">Actual</span>
                  }
                </div>
                <p class="role">{{ job.role }}</p>
              </div>
              <div class="card-meta">
                <span class="period">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                  </svg>
                  {{ job.period }}
                </span>
                <span class="location">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                  </svg>
                  {{ job.location }}
                </span>
              </div>
            </div>

            <ul class="achievements">
              @for (a of job.achievements; track a) {
                <li>
                  <svg class="check-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    [attr.stroke]="job.color" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                  </svg>
                  <span [innerHTML]="a"></span>
                </li>
              }
            </ul>
          </div>
        </div>
      }

      <div class="timeline-line"></div>
    </div>

  </div>
</section>
